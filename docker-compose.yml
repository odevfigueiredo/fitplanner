services:
  mysql:
    image: mysql:8.4
    container_name: fitplanner-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fitplanner_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fitplanner}
      MYSQL_USER: ${MYSQL_USER:-fitplanner}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fitplanner}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - fitplanner_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  fitplanner_mysql:
